<!DOCTYPE html>
<html>
  <head>
    <title>Prueba AR.js - Estatua Animada</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script>
      AFRAME.registerComponent('controlador-audio', {
        init: function () {
          let audio = document.querySelector('#mi-audio');
          this.el.addEventListener('markerFound', () => {
            audio.play();
          });
          this.el.addEventListener('markerLost', () => {
            audio.pause();
            audio.currentTime = 0;
          });
        }
      });
    </script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="mona-model" src="EstatuaBernardoOhiggins.glb"></a-asset-item>
        <audio id="mi-audio" src="audio.mp3" preload="auto"></audio>
      </a-assets>

      <a-light type="ambient" color="#ffffff" intensity="1.5"></a-light>
      <a-light type="directional" color="#ffffff" intensity="2" position="-1 2 1"></a-light>

      <a-marker preset="hiro" controlador-audio>
        <a-entity 
          gltf-model="#mona-model" 
          scale="0.01 0.01 0.01" 
          position="0 0 0"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear;">
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
